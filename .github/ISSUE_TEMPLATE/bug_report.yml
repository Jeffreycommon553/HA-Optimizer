name: Bug Report
description: Report a bug or unexpected behaviour in HA Optimizer
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible.

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant Version
      placeholder: "e.g. 2024.12.1"
    validations:
      required: true

  - type: input
    id: integration_version
    attributes:
      label: HA Optimizer Version
      placeholder: "e.g. 1.0.0"
    validations:
      required: true

  - type: dropdown
    id: database
    attributes:
      label: Recorder Database
      options:
        - SQLite (default)
        - MySQL / MariaDB
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear description of what happened vs what you expected.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to ...
        2. Call service ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any error logs from Settings → System → Logs. Filter by `ha_optimizer`.
      render: text
